name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build static web assets
        run: npm run build

      - name: Install Capacitor
        run: npm install @capacitor/core@6 @capacitor/android@6 @capacitor/cli@6

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'CFG'
          {
            "appId": "com.cseguide.app",
            "appName": "CSEGuide",
            "webDir": "dist"
          }
          CFG

      - name: Generate Android project
        run: npx cap add android

      - name: Sync web build into Android
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSEGuide-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: CSEGuide build ${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
